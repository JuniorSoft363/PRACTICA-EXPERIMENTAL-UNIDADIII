# Nombre de la aplicación
spring.application.name=artisync

# ==========================================
# CONFIGURACIÓN DE BASE DE DATOS (PostgreSQL)
# ==========================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/artisyncbd}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# CONFIGURACIÓN DE JPA & HIBERNATE
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false


# ==========================================
# CONFIGURACIÓN DE FLYWAY
# ==========================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ==========================================
# CONFIGURACIÓN DE REDIS (Caché & Blacklist)
# ==========================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ==========================================
# CONFIGURACIÓN DE SEGURIDAD JWT (Personalizada)
# ==========================================
security.jwt.secret-key=${JWT_SECRET}
security.jwt.expiration-time=${JWT_EXPIRATION:86400000}
security.jwt.refresh-expiration-time=${JWT_REFRESH_EXPIRATION:604800000}

# ==========================================
# CONFIGURACIÓN DE ACTUATOR (Monitoreo & Healthcheck)
# ==========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.mail.enabled=false

# ==========================================
# CONFIGURACIÓN DE CORREO (SMTP)
# ==========================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:correo@ejemplo.com}
spring.mail.password=${MAIL_PASSWORD:contrasena}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# URL del Frontend para construir los enlaces de correos
app.frontend.url=${FRONTEND_URL:http://localhost:4200}

# ==============================
# Servidor
# ==============================
server.port=8080

# ==========================================
# CONFIGURACIÓN DE SPRINGDOC / SWAGGER / OPENAPI
# ==========================================
springdoc.api-docs.path=/api/docs
springdoc.swagger-ui.path=/api/swagger-ui.html

